<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SteamVault - 欢迎</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#005FB7",
                        "on-primary": "#FFFFFF",
                        "primary-container": "#D6E3FF",
                        "on-primary-container": "#001B3C",
                        "secondary": "#565E71",
                        "on-secondary": "#FFFFFF",
                        "secondary-container": "#DAE2F9",
                        "on-secondary-container": "#131C2C",
                        "surface": "#1A1C1E",
                        "on-surface": "#E2E2E5",
                        "surface-variant": "#44474E",
                        "on-surface-variant": "#C4C6D0",
                        "outline": "#8E9099",
                        "background": "#1A1C1E",
                        "error": "#FFB4AB",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "button": "12px",
                        "card": "16px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #1A1C1E;
            color: #E2E2E5;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(26, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hero-gradient {
            background: radial-gradient(circle at center, rgba(0, 95, 183, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center overflow-hidden">
<!-- Main Content -->
<main class="flex-1 w-full max-w-lg px-6 flex flex-col items-center justify-center text-center">
<!-- Visual Anchor -->
<div class="relative w-full aspect-square max-w-[300px] mb-10 flex items-center justify-center hero-gradient">
<!-- Layers of security metaphor -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-56 h-56 bg-surface-variant/20 rounded-[48px] rotate-[12deg] blur-sm"></div>
<div class="w-56 h-56 bg-surface-variant/30 rounded-[48px] -rotate-[8deg]"></div>
<!-- Core Monolith -->
<div class="relative z-10 w-44 h-44 bg-primary flex items-center justify-center rounded-[40px] shadow-2xl">
<span class="material-symbols-outlined text-on-primary text-7xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
</div>
<!-- Contextual Floating Icons -->
<div class="absolute top-4 right-4 w-12 h-12 bg-surface-variant rounded-full flex items-center justify-center border border-outline/20">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="absolute bottom-6 left-2 w-14 h-14 bg-surface-variant rounded-2xl flex items-center justify-center border border-outline/10">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">key</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">
                欢迎使用令牌库
            </h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed px-6">
                您的 Steam 账户安全卫士。所有令牌均在<span class="text-primary font-medium">本地加密存储</span>，绝不上传云端。
            </p>
</div>
<!-- Trust Indicators (Chips) -->
<div class="mt-10 flex flex-wrap gap-3 items-center justify-center">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-variant/40 rounded-full border border-outline/10">
<span class="material-symbols-outlined text-primary text-lg">verified_user</span>
<span class="font-body text-xs font-semibold tracking-wide text-on-surface-variant uppercase">本地加密</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-variant/40 rounded-full border border-outline/10">
<span class="material-symbols-outlined text-primary text-lg">cloud_off</span>
<span class="font-body text-xs font-semibold tracking-wide text-on-surface-variant uppercase">零云端传输</span>
</div>
</div>
</main>
<!-- Bottom Actions Area -->
<footer class="w-full max-w-lg px-6 pb-10 pt-6 glass-effect border-t border-outline/5">
<div class="flex flex-col gap-3">
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline font-bold h-14 rounded-button shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>开始使用</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- Secondary Action -->
<button class="w-full bg-transparent text-on-surface font-headline font-semibold h-14 rounded-button border border-outline/30 hover:bg-surface-variant/20 transition-colors active:scale-[0.98]">
                从备份恢复
            </button>
</div>
<!-- Home Indicator Spacer -->
<div class="mt-6 flex justify-center">
<div class="w-32 h-1 bg-outline/20 rounded-full"></div>
</div>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed -bottom-32 -left-32 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed top-10 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
