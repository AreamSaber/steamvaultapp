<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#121416",
                        "outline-variant": "#414752",
                        "primary-fixed": "#d6e3ff",
                        "surface": "#121416",
                        "on-secondary-fixed-variant": "#324769",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1a1c1e",
                        "inverse-surface": "#e2e2e5",
                        "tertiary-fixed-dim": "#ffb68f",
                        "secondary-container": "#324769",
                        "on-tertiary-fixed": "#331100",
                        "on-secondary": "#1a3151",
                        "surface-container-highest": "#333537",
                        "secondary": "#b2c7f0",
                        "on-tertiary-fixed-variant": "#773200",
                        "tertiary-container": "#9f4500",
                        "on-surface": "#e2e2e5",
                        "outline": "#8c919d",
                        "tertiary-fixed": "#ffdbca",
                        "on-primary-fixed": "#001b3c",
                        "background": "#121416",
                        "surface-variant": "#333537",
                        "on-secondary-fixed": "#011b3b",
                        "on-secondary-container": "#a0b6de",
                        "surface-container": "#1e2022",
                        "surface-bright": "#37393b",
                        "primary-fixed-dim": "#a8c8ff",
                        "on-primary-fixed-variant": "#00468a",
                        "surface-tint": "#a8c8ff",
                        "primary": "#a8c8ff",
                        "on-background": "#e2e2e5",
                        "primary-container": "#005fb7",
                        "surface-container-high": "#282a2c",
                        "inverse-on-surface": "#2f3133",
                        "inverse-primary": "#005eb4",
                        "surface-container-lowest": "#0c0e10",
                        "on-surface-variant": "#c1c6d4",
                        "on-tertiary-container": "#ffd1bb",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary": "#003062",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#b2c7f0",
                        "secondary-fixed": "#d6e3ff",
                        "on-tertiary": "#542100",
                        "on-primary-container": "#c9dbff",
                        "tertiary": "#ffb68f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .monolith-bg {
            background: radial-gradient(circle at top right, #1a1c1e 0%, #121416 100%);
        }
        .glass-panel {
            background: rgba(26, 28, 30, 0.6);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body monolith-bg min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#1a1c1e] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#005FB7] dark:text-[#a8c8ff]" data-icon="shield">shield</span>
<h1 class="font-['Manrope'] font-bold tracking-tight uppercase text-lg font-extrabold tracking-tighter text-[#005FB7] dark:text-[#a8c8ff]">STEAMVAULT</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-[#414752]" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Header Section -->
<section class="mb-10 text-left">
<h2 class="font-headline text-3xl font-extrabold tracking-tight mb-3 text-on-surface">扫码登录</h2>
<p class="text-on-surface-variant leading-relaxed text-sm">
                用于批准电脑端 Steam 登录请求（与“确认列表”不同）。
            </p>
</section>
<!-- Stepper Component (Vertical Asymmetric) -->
<section class="mb-12 relative">
<div class="absolute left-4 top-0 bottom-0 w-0.5 bg-outline-variant opacity-20"></div>
<div class="space-y-10">
<!-- Step 1 -->
<div class="relative flex gap-6 items-start">
<div class="z-10 flex-shrink-0 w-8 h-8 rounded-full bg-primary-container text-white flex items-center justify-center font-bold text-sm">1</div>
<div class="pt-1">
<h3 class="text-on-surface font-semibold mb-1">粘贴链接</h3>
<p class="text-on-surface-variant text-xs">将电脑端显示的二维码链接粘贴至下方</p>
</div>
</div>
<!-- Step 2 -->
<div class="relative flex gap-6 items-start opacity-40">
<div class="z-10 flex-shrink-0 w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold text-sm border border-outline-variant/30">2</div>
<div class="pt-1">
<h3 class="text-on-surface font-semibold mb-1">选择账户</h3>
<p class="text-on-surface-variant text-xs">确认用于本次登录的 Steam 账号</p>
</div>
</div>
<!-- Step 3 -->
<div class="relative flex gap-6 items-start opacity-40">
<div class="z-10 flex-shrink-0 w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold text-sm border border-outline-variant/30">3</div>
<div class="pt-1">
<h3 class="text-on-surface font-semibold mb-1">核对并批准</h3>
<p class="text-on-surface-variant text-xs">检查位置与设备信息，完成授权</p>
</div>
</div>
</div>
</section>
<!-- Input Area (Bento-style Card) -->
<section class="mb-10">
<div class="bg-surface-container-low rounded-xl p-6 shadow-sm">
<label class="block text-xs font-medium text-primary mb-3 uppercase tracking-wider" for="qr-link">Steam QR Link</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none text-on-surface py-4 px-4 rounded-lg font-mono text-sm focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50" id="qr-link" placeholder="https://s.team/q/..." type="text"/>
<div class="absolute bottom-0 left-0 w-full h-0.5 bg-primary transform scale-x-0 transition-transform duration-300 origin-left" id="input-accent"></div>
</div>
<div class="mt-4 flex items-center gap-2 text-[11px] text-on-surface-variant/70">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
<span>通常是以 s.team/q/ 开头的加密链接</span>
</div>
</div>
</section>
<!-- Visual Context Card (Monolith Aesthetic) -->
<section class="bg-surface-container-lowest border border-outline-variant/10 rounded-2xl overflow-hidden mb-12">
<div class="flex items-center gap-4 p-5">
<div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="minimalist steam logo on high-tech dark background with subtle blue rim lighting and depth of field" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkMo_tPrvnenXz7j-Lr5Frg4gmppybUGIeU76VXXLBfox9JAg8UOYRGH4ZY6oC9gibjSYlLIXlYzT8sjJumcWwnkLnZlyMetoSGDPoUm8USkTa2lQW8uCsksgBmDAiLTg8C-t8kqHzlgisGSe_TTl-fosA52dgSMwYRAcW3fwnnhUKKniFJpfRgMA8FHWVMx4PVUpO4CoHItz9gqYheEsA8eO9-5PNiYWcwOTPv6dvlnXZSLinoHQC2Xvu6vXIIo4AXlMLTB_AwhxX"/>
</div>
<div>
<h4 class="text-sm font-semibold text-on-surface">安全隔离层</h4>
<p class="text-[11px] text-on-surface-variant">SteamVault 确保您的令牌在本地解密且不上传至非官方服务器。</p>
</div>
</div>
</section>
<!-- Fixed Primary CTA -->
<div class="fixed bottom-32 left-0 w-full px-6 pointer-events-none">
<button class="pointer-events-auto w-full max-w-lg mx-auto h-14 bg-gradient-to-r from-primary-container to-primary text-on-primary font-bold rounded-full shadow-[0_8px_24px_rgba(0,95,183,0.3)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
                读取登录请求
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Hybrid Active State: QR Scan active) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-end pb-6 px-4 bg-[#121416]/60 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_32px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Vault</span>
</a>
<a class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="devices">devices</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Sessions</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#005fb7] text-white rounded-full p-3 mb-2 scale-110 shadow-[0_0_15px_rgba(0,95,183,0.3)] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<!-- Label hidden for active FAB state as per premium patterns -->
</a>
<a class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-medium mt-1">Settings</span>
</a>
</nav>
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#121416] to-transparent pointer-events-none z-40"></div>
</body></html>
