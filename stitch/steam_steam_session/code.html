<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#121416",
                        "outline-variant": "#414752",
                        "primary-fixed": "#d6e3ff",
                        "surface": "#121416",
                        "on-secondary-fixed-variant": "#324769",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1a1c1e",
                        "inverse-surface": "#e2e2e5",
                        "tertiary-fixed-dim": "#ffb68f",
                        "secondary-container": "#324769",
                        "on-tertiary-fixed": "#331100",
                        "on-secondary": "#1a3151",
                        "surface-container-highest": "#333537",
                        "secondary": "#b2c7f0",
                        "on-tertiary-fixed-variant": "#773200",
                        "tertiary-container": "#9f4500",
                        "on-surface": "#e2e2e5",
                        "outline": "#8c919d",
                        "tertiary-fixed": "#ffdbca",
                        "on-primary-fixed": "#001b3c",
                        "background": "#121416",
                        "surface-variant": "#333537",
                        "on-secondary-fixed": "#011b3b",
                        "on-secondary-container": "#a0b6de",
                        "surface-container": "#1e2022",
                        "surface-bright": "#37393b",
                        "primary-fixed-dim": "#a8c8ff",
                        "on-primary-fixed-variant": "#00468a",
                        "surface-tint": "#a8c8ff",
                        "primary": "#a8c8ff",
                        "on-background": "#e2e2e5",
                        "primary-container": "#005fb7",
                        "surface-container-high": "#282a2c",
                        "inverse-on-surface": "#2f3133",
                        "inverse-primary": "#005eb4",
                        "surface-container-lowest": "#0c0e10",
                        "on-surface-variant": "#c1c6d4",
                        "on-tertiary-container": "#ffd1bb",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary": "#003062",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#b2c7f0",
                        "secondary-fixed": "#d6e3ff",
                        "on-tertiary": "#542100",
                        "on-primary-container": "#c9dbff",
                        "tertiary": "#ffb68f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121416;
            color: #e2e2e5;
        }
        .monolith-header {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#1a1c1e] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a8c8ff]" data-icon="shield">shield</span>
<h1 class="text-lg font-extrabold tracking-tighter text-[#005FB7] dark:text-[#a8c8ff] font-['Manrope'] uppercase">STEAMVAULT</h1>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#1a1c1e] transition-colors p-2 rounded-full active:scale-95 active:duration-75">
<span class="material-symbols-outlined text-[#414752]" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen">
<!-- Hero Editorial Section -->
<section class="mb-10">
<h2 class="text-4xl font-extrabold monolith-header tracking-tight text-on-surface mb-3 leading-tight">
                Steam 会话
            </h2>
<p class="text-on-surface-variant text-base leading-relaxed max-w-md">
                用于加载确认列表与提交批准操作。会话可能会过期。
            </p>
</section>
<!-- Status Card (Bento Style) -->
<div class="grid grid-cols-1 gap-4 mb-8">
<div class="bg-surface-container-low rounded-3xl p-6 relative overflow-hidden">
<div class="absolute top-0 right-0 p-8 opacity-10">
<span class="material-symbols-outlined text-9xl" data-icon="verified_user">verified_user</span>
</div>
<div class="flex items-center gap-4 mb-6">
<div class="w-12 h-12 rounded-2xl bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="cloud_done" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
</div>
<div>
<span class="text-xs font-bold text-primary uppercase tracking-widest block mb-1">当前状态</span>
<div class="flex items-center gap-2">
<span class="text-2xl font-bold monolith-header">已保存</span>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center py-3 px-4 bg-surface-container rounded-2xl">
<span class="text-sm text-on-surface-variant">同步时间</span>
<span class="text-sm font-mono text-on-surface">2023-10-24 14:20</span>
</div>
<div class="flex justify-between items-center py-3 px-4 bg-surface-container rounded-2xl">
<span class="text-sm text-on-surface-variant">有效性</span>
<span class="text-sm font-medium text-tertiary">23 小时后过期</span>
</div>
</div>
</div>
</div>
<!-- Primary Actions -->
<section class="flex flex-col gap-4 mb-10">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-bold text-base shadow-[0_8px_24px_rgba(0,95,183,0.25)] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="refresh">refresh</span>
                验证并刷新会话
            </button>
<button class="w-full h-14 rounded-full border border-outline-variant/20 hover:bg-error-container/10 text-error font-semibold transition-colors active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="delete_sweep">delete_sweep</span>
                清除会话
            </button>
</section>
<!-- Advanced Section (Manual Entry) -->
<details class="group bg-surface-container-low rounded-3xl overflow-hidden transition-all">
<summary class="list-none p-6 flex items-center justify-between cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="terminal">terminal</span>
<span class="font-bold monolith-header text-on-surface">手动输入数据 (高级)</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-open:rotate-180 transition-transform" data-icon="expand_more">expand_more</span>
</summary>
<div class="px-6 pb-6 pt-2">
<p class="text-sm text-on-surface-variant mb-4">
                    如果您需要手动更新安全令牌，请在下方粘贴原始数据流。
                </p>
<div class="relative group/input">
<textarea class="w-full h-32 bg-surface-container-highest rounded-2xl border-none focus:ring-0 text-sm font-mono p-4 text-on-surface placeholder:text-outline" placeholder="在此粘贴加密会话数据..."></textarea>
<div class="absolute bottom-0 left-0 w-full h-0.5 bg-primary scale-x-0 group-focus-within/input:scale-x-100 transition-transform origin-left"></div>
</div>
<button class="mt-4 w-full py-3 rounded-xl bg-surface-container-high text-on-surface font-bold text-sm hover:bg-surface-bright transition-colors">
                    应用手动更改
                </button>
</div>
</details>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-end pb-6 px-4 bg-[#121416]/60 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_32px_rgba(0,0,0,0.4)]">
<div class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
<span class="font-['Inter'] text-[11px] font-medium">Vault</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#005fb7] text-white rounded-full p-3 mb-2 scale-110 shadow-[0_0_15px_rgba(0,95,183,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="devices" style="font-variation-settings: 'FILL' 1;">devices</span>
<span class="font-['Inter'] text-[11px] font-medium">Sessions</span>
</div>
<div class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-['Inter'] text-[11px] font-medium">QR Scan</span>
</div>
<div class="flex flex-col items-center justify-center text-[#414752] p-2 hover:text-[#a8c8ff] transition-all active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-medium">Settings</span>
</div>
</nav>
<!-- Decorative Gradient Background Element -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-tertiary-container/5 blur-[100px] rounded-full pointer-events-none"></div>
</body></html>
