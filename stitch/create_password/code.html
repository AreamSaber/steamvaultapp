<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SteamVault - 设置主密码</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#005FB7",
                        "on-primary": "#FFFFFF",
                        "primary-container": "#D6E3FF",
                        "on-primary-container": "#001B3C",
                        "surface": "#1A1C1E",
                        "on-surface": "#E2E2E5",
                        "surface-variant": "#414752",
                        "on-surface-variant": "#C1C6D4",
                        "outline": "#8C919D",
                        "background": "#121416",
                        "error": "#BA1A1A",
                        "success": "#2E7D32"
                    },
                    borderRadius: {
                        "DEFAULT": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "manrope": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #121416;
            color: #E2E2E5;
            font-family: 'Manrope', 'Inter', sans-serif;
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-20 bg-background/80 backdrop-blur-md">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="shield">shield</span>
<h1 class="font-manrope tracking-tighter font-extrabold text-2xl text-primary">SteamVault</h1>
</div>
<button class="hover:bg-surface-variant/20 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-outline" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32">
<div class="max-w-md w-full">
<!-- Header Section -->
<div class="mb-8 text-left">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock_reset">lock_reset</span>
</div>
<h2 class="font-manrope font-extrabold text-3xl tracking-tight text-on-surface mb-3">设置主密码</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed">
                    主密码用于加密您的令牌库。请务必牢记，丢失主密码将导致无法找回已存储的令牌数据。
                </p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Input Field 1 -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">输入主密码</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all font-mono" placeholder="建议 12 位以上字符" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-on-surface" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Input Field 2 -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">确认主密码</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all font-mono" placeholder="再次输入以确认" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<span class="material-symbols-outlined text-outline" data-icon="check_circle">check_circle</span>
</div>
</div>
</div>
<!-- Password Strength Recommendation Card -->
<div class="bg-surface p-5 rounded-xl border border-surface-variant/30 space-y-4">
<div class="flex items-center justify-between">
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">安全强度建议</span>
<span class="text-xs font-semibold text-primary/80">待评估</span>
</div>
<div class="grid grid-cols-2 gap-y-3 gap-x-2">
<div class="flex items-center gap-2 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="circle">circle</span>
<span>包含大小写字母</span>
</div>
<div class="flex items-center gap-2 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="circle">circle</span>
<span>包含数字或符号</span>
</div>
<div class="flex items-center gap-2 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-sm text-error" data-icon="cancel">cancel</span>
<span>长度不小于 12 位</span>
</div>
<div class="flex items-center gap-2 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-sm text-success" data-icon="check_circle">check_circle</span>
<span>不包含个人信息</span>
</div>
</div>
</div>
<!-- Security Info Card -->
<div class="relative overflow-hidden p-5 bg-primary/5 rounded-xl border border-primary/10 flex items-center gap-4">
<div class="relative z-10 flex-grow">
<p class="text-[10px] font-bold text-primary uppercase tracking-widest mb-1">端到端加密</p>
<p class="text-xs text-on-surface-variant leading-normal">所有密码均在本地进行 AES-256 加密，绝不上传至任何云端服务器。</p>
</div>
<div class="relative z-10">
<span class="material-symbols-outlined text-primary/40 text-4xl" data-icon="verified_user">verified_user</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Anchor -->
<div class="fixed bottom-0 w-full px-6 pb-10 pt-4 bg-background/90 backdrop-blur-md">
<div class="max-w-md mx-auto">
<button class="w-full h-14 rounded-lg bg-surface-variant text-outline font-manrope font-bold text-base cursor-not-allowed flex items-center justify-center gap-2 transition-all" disabled="">
<span class="material-symbols-outlined text-xl" data-icon="lock_open">lock_open</span>
                完成设置
            </button>
<p class="text-center text-[10px] text-outline mt-4 font-body uppercase tracking-tight">
                继续操作即表示您已了解主密码对保护令牌库的重要性
            </p>
</div>
</div>
<!-- Decorative gradients as per Monolith vibe -->
<div class="fixed top-0 right-0 w-1/3 h-full bg-gradient-to-l from-primary/5 to-transparent pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-1/4 h-1/2 bg-gradient-to-tr from-primary/5 to-transparent pointer-events-none"></div>
</body></html>
